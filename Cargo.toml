[package]
name = "mini-pi"
version = "0.1.0"
edition = "2024"

[dependencies]
gpui = "0.2.2"
unicode-segmentation = "1.12"
smol = "2"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"
rusqlite = { version = "0.33", features = ["bundled"] }
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
