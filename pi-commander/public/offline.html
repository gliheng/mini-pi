<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline - pi commander</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #fafafa;
      color: #18181b;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #09090b;
        color: #fafafa;
      }
    }

    .container {
      max-width: 20rem;
      text-align: center;
    }

    .icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1rem;
      color: #3b82f6;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }

    p {
      margin: 0 0 1.5rem;
      color: #71717a;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      p {
        color: #a1a1aa;
      }
    }

    button {
      padding: 0.5rem 1rem;
      border: 1px solid #d4d4d8;
      border-radius: 0.5rem;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    @media (prefers-color-scheme: dark) {
      button {
        border-color: #3f3f46;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.05);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
      <path d="m14.5 9-5 5"/>
      <path d="m9.5 9 5 5"/>
    </svg>
    <h1>You’re offline</h1>
    <p>pi commander needs an internet connection to reach your mini-pi tunnel.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
